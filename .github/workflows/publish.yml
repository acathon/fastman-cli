name: Publish to (Test)PyPI

# Builds sdist + wheel and publishes:
#   - Tag push  v*.*.*-test  -> TestPyPI
#   - Tag push  v*.*.*       -> PyPI
#   - Manual    workflow_dispatch with target=testpypi|pypi
#
# Uses PyPA Trusted Publishing (OIDC) - no API tokens stored as secrets.
# Configure pending/trusted publishers at:
#   https://test.pypi.org/manage/account/publishing/
#   https://pypi.org/manage/account/publishing/
# Project name: fastman, workflow filename: publish.yml,
# environment: testpypi or pypi (matches the `environment:` keys below).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Where to publish'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Validate with twine check
        run: python -m twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi') ||
      (github.event_name == 'push' && endsWith(github.ref, '-test'))
    environment:
      name: testpypi
      url: https://test.pypi.org/project/fastman/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !endsWith(github.ref, '-test'))
    environment:
      name: pypi
      url: https://pypi.org/project/fastman/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
